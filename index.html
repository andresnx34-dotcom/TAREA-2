<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea Coursera - Proyecto Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#contenido-principal" class="skip-link">Saltar al contenido principal</a>

    <header>
        <nav>
            <img src="logo.png" alt="Logotipo del sitio">
            <ul>
                <li>Inicio</li>
                <li>Parques</li>
                <li>Contacto</li>
            </ul>
        </nav>
    </header>

    <main id="contenido-principal">
        
        <h2>Galería en Cuadrícula</h2>
        <section class="grid">
            <div>
                <img src="imagen-grid-1.jpg" alt="Elemento de la rejilla 1">
                <h3>Destino A</h3>
            </div>
            <div>
                <img src="imagen-grid-2.jpg" alt="Elemento de la rejilla 2">
                <h3>Destino B</h3>
            </div>
        </section>

        <hr>

        <h2>Nuestros Parques</h2>
        <section class="flex">
            <div class="park-card">
                <img src="parque-1.jpg" alt="Parque Natural 1">
                <p>Información detallada del primer parque nacional.</p>
            </div>
            <div class="park-card">
                <img src="parque-2.jpg" alt="Parque Natural 2">
                <p>Información detallada del segundo parque nacional.</p>
            </div>
        </section>

    </main>
</body>
</html>
